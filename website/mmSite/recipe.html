<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title id="windowsTitle">Recipe</title>
        <link rel="stylesheet" href="./assets/app.css">
    </head>
    <body>
        <video class="bg-video" autoplay muted loop playsinline disablepictureinpicture controlslist="nodownload noplaybackrate noremoteplayback">
            <source src="./assets/mp4/dustParticles.mp4" type="video/mp4">
        </video>
        <div id="siteHeader"></div>
        <main class="page" id="recipePage">
            <div class="toolbar recipe-toolbar">
                <a class="btn" href="./recipes.html" aria-label="Back to list" title="Back to list">←</a>

                <div class="recipe-toolbar-nav" role="group" aria-label="Recipe navigation controls">
                    <button class="btn" id="prevBtn">Previous</button>

                    <div class="field recipe-index-field">
                        <input type="text" id="currentRecipeIndex" class="indexText" inputmode="numeric" aria-label="Recipe index">
                    </div>

                    <button class="btn" id="nextBtn">Next</button>
                </div>

                <button class="btn" id="addToCraftBtn" aria-label="Push to crafting tool" title="Push to crafting tool">↗</button>
            </div>

            <div class="Error" id="Error"></div>
            <h1 id="recipeName">Recipe Name</h1>
            <p class="page-subtitle" id="recipeCategory">Category</p>

            <div class="recipe-stack">
                <div class="card" id="requirementsCard">
                    <div class="section-title">Requirements</div>
                    <div class="requirements-columns" id="requirementsItems">
                        <div class="requirement-column" id="craftingTimeColumn">
                            <div class="requirement-column-title">Crafting Time</div>
                            <div class="requirement-column-items" id="craftingTimeItems"></div>
                        </div>

                        <div class="requirement-column" id="skillsColumn">
                            <div class="requirement-column-title">Skills</div>
                            <div class="requirement-column-items" id="skillsItems"></div>
                        </div>

                        <div class="requirement-column" id="toolsColumn">
                            <div class="requirement-column-title">Tools</div>
                            <div class="requirement-column-items" id="toolsItems"></div>
                        </div>
                    </div>
                </div>

                <div class="recipe-side-by-side-row">
                    <div class="card" id="ingredientsCard">
                        <div class="section-title">Ingredients</div>
                        <ul class="list" id="ingredientsList"></ul>
                    </div>

                    <div class="recipe-flow-arrow" id="ingredientsResultsArrow" aria-hidden="true">→</div>

                    <div class="card" id="resultsCard">
                        <div class="section-title">Results</div>
                        <ul class="list" id="resultsList"></ul>
                    </div>
                </div>

                <div class="card" id="relatedRecipesCard">
                    <div class="section-title">Related Recipes</div>
                    <ul class="list" id="relatedRecipesList"></ul>
                </div>
            </div>
        </main>

        <!-- Custom right-click menu -->
        <div id="ctxMenu" class="ctx" hidden>
            <button type="button" data-action="toggle-favorited">⭐ Favorite</button>

            <div class="ctx-sep"></div>

            <div class="ctx-label">Set category</div>
            <button type="button" data-action="set-category" data-category="Blacksmithing">Blacksmithing</button>
            <button type="button" data-action="set-category" data-category="Brewing">Brewing</button>
            <button type="button" data-action="set-category" data-category="Cooking">Cooking</button>
            <button type="button" data-action="set-category" data-category="">Clear category</button>
        </div>

        <script type="module" src="./assets/layout.js"></script>
        <script type="module" src="./assets/app.js"></script>
        <script type="module" src="./assets/rightClickMenu.js"></script>
        <script window.MM_PAGE = "Recipe"></script>

    </body>
</html>
