<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <title id="windowsTitle">Inventory Hub</title>
        <link rel="stylesheet" href="./assets/app.css">
    </head>
    <body>
        <div id="siteHeader"></div>
        <main class="page">
            <h1>Inventories</h1>
            <div id="inventories"></div>

            <div class="toolbar inv-toolbar">
                <div class="field inv-search-field">
                    <label for="inv-search">Search</label>
                    <input type="search" id="inv-search" placeholder="Search inventory...">
                </div>

                <div class="field inv-sort-field">
                    <label for="inv-sort">Sort</label>
                    <select id="inv-sort">
                        <option value="name_asc">Name (A→Z)</option>
                        <option value="name_desc">Name (Z→A)</option>
                        <option value="qty_desc">Quantity (High→Low)</option>
                        <option value="qty_asc">Quantity (Low→High)</option>
                    </select>
                </div>
            </div>

            <div class="toolbar inv-toolbar-actions">
                <button id="inv-filter-toggle" class="btn" type="button" title="Toggle inventory filters" aria-label="Toggle inventory filters">⊞</button>
                <button id="refreshInventoryBtn" class="btn refresh-action-btn" type="button" title="Refresh inventory from latest data" aria-label="Refresh inventory from latest data">
                    <span class="refresh-icon">↻</span>
                </button>
            </div>

            <div class="inv-toolbar-meta">
                <span id="inventoryLastSynced" class="last-synced"></span>
            </div>

            <div id="inv-category-panel" class="inv-category-panel" hidden>
                <div id="inv-category-pills" class="inv-pills"></div>
            </div>

            <div class="card inv-item-card">
                <ul class="list inv-item-grid" id="playerInventoryList"></ul>
            </div>
        </main>

        <!-- Custom right-click menu -->
        <div id="ctxMenu" class="ctx" hidden>
            <button type="button" data-action="toggle-favorited">⭐ Favorite</button>

            <div class="ctx-sep"></div>

            <div class="ctx-label">Set category</div>
            <button type="button" data-action="set-category" data-category="Blacksmithing">Blacksmithing</button>
            <button type="button" data-action="set-category" data-category="Brewing">Brewing</button>
            <button type="button" data-action="set-category" data-category="Cooking">Cooking</button>
            <button type="button" data-action="set-category" data-category="">Clear category</button>
        </div>

        <script type="module" src="./assets/layout.js"></script>
        <script type="module" src="./assets/app.js"></script>
        <script type="module" src="./assets/rightClickMenu.js"></script>
        <script window.MM_PAGE = "Inventories"></script>

    </body>
</html>
